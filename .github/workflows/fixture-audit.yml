name: Fixture Audit

on:
  schedule:
    - cron: "7,17,27,37,47,57 4,5 * * *"
  workflow_dispatch:
    inputs:
      scope:
        description: "Which audits to run"
        required: true
        default: due
        type: choice
        options:
          - due
          - all

concurrency:
  group: fixture-audit
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Decide whether this run should execute
        id: localtime
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            echo "local_date=$(TZ=Europe/Copenhagen date +%F)" >> "$GITHUB_OUTPUT"
            echo "local_time=$(TZ=Europe/Copenhagen date +%H:%M)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_hour="$(TZ=Europe/Copenhagen date +%H)"
          local_date="$(TZ=Europe/Copenhagen date +%F)"
          local_time="$(TZ=Europe/Copenhagen date +%H:%M)"
          echo "local_date=$local_date" >> "$GITHUB_OUTPUT"
          echo "local_time=$local_time" >> "$GITHUB_OUTPUT"
          if [ "$local_hour" = "06" ]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_now=false" >> "$GITHUB_OUTPUT"
            echo "Not 06:00 in Copenhagen, skipping."
          fi

      - name: Restore daily audit success marker
        if: steps.localtime.outputs.run_now == 'true' && github.event_name == 'schedule'
        id: marker
        uses: actions/cache/restore@v4
        with:
          path: .github/.tmp/fixture-audit-marker
          key: fixture-audit-${{ steps.localtime.outputs.local_date }}

      - name: Skip if fixture audit already succeeded today
        if: steps.localtime.outputs.run_now == 'true' && github.event_name == 'schedule' && steps.marker.outputs.cache-hit == 'true'
        run: |
          echo "Fixture audit already completed successfully on ${{ steps.localtime.outputs.local_date }}."

      - name: Check out repository
        if: steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true')
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true')
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fixture audits
        if: steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true')
        id: audit
        continue-on-error: true
        run: |
          set +e
          mkdir -p data/fixture-audits/reports
          mode="due"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="${{ inputs.scope }}"
          fi

          if [ "$mode" = "all" ]; then
            cmd=(python3 scripts/run-fixture-audits.py --all --apply-safe-updates)
          else
            cmd=(python3 scripts/run-fixture-audits.py --due --apply-safe-updates)
          fi

          output="$("${cmd[@]}" 2>&1)"
          status=$?
          printf '%s\n' "$output"
          printf '%s\n' "$output" > data/fixture-audits/reports/latest-run.log

          if [ "$mode" = "due" ] && [ "$output" = "No audits due today" ]; then
            echo "had_due=false" >> "$GITHUB_OUTPUT"
            echo "status_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "had_due=true" >> "$GITHUB_OUTPUT"
          echo "status_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit reports
        if: always() && steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true') && steps.audit.outputs.had_due == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fixture-audit-report
          path: |
            data/fixture-audits/reports/latest.json
            data/fixture-audits/reports/latest.md
            data/fixture-audits/reports/latest-updates.json
            data/fixture-audits/reports/latest-updates.md
            data/fixture-audits/reports/latest-run.log
            data/fixture-audits/reports/latest-email.log

      - name: Commit automatic fixture updates
        if: always() && steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true') && steps.audit.outputs.had_due == 'true'
        id: autocommit
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fixtures.json public/reference-data/fixtures.remote.json
          if git diff --cached --quiet; then
            echo "changes_pushed=false" >> "$GITHUB_OUTPUT"
            echo "push_status=no_changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git commit -m "chore: auto-update fixtures"; then
            echo "changes_pushed=false" >> "$GITHUB_OUTPUT"
            echo "push_status=commit_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for attempt in 1 2 3; do
            git fetch origin main
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "changes_pushed=true" >> "$GITHUB_OUTPUT"
              echo "push_status=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 2))
            fi
          done

          echo "changes_pushed=false" >> "$GITHUB_OUTPUT"
          echo "push_status=failed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Send fixture audit email
        if: always() && steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true') && steps.audit.outputs.had_due == 'true'
        id: email
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FIXTURE_CHECK_NOTIFY_TO: ${{ secrets.FIXTURE_CHECK_NOTIFY_TO }}
          FIXTURE_CHECK_NOTIFY_FROM: ${{ secrets.FIXTURE_CHECK_NOTIFY_FROM }}
        run: |
          set +e
          output="$(python3 scripts/send-fixture-audit-email.py 2>&1)"
          status=$?
          printf '%s\n' "$output"
          printf '%s\n' "$output" > data/fixture-audits/reports/latest-email.log
          echo "status_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Prepare fixture audit success marker
        if: always() && steps.localtime.outputs.run_now == 'true' && github.event_name == 'schedule' && steps.marker.outputs.cache-hit != 'true' && steps.audit.outputs.had_due == 'true' && steps.email.outputs.status_code == '0'
        run: |
          mkdir -p .github/.tmp/fixture-audit-marker
          printf '%s\n' "${{ steps.localtime.outputs.local_date }} ${{ steps.localtime.outputs.local_time }}" > .github/.tmp/fixture-audit-marker/success.txt

      - name: Save fixture audit success marker
        if: always() && steps.localtime.outputs.run_now == 'true' && github.event_name == 'schedule' && steps.marker.outputs.cache-hit != 'true' && steps.audit.outputs.had_due == 'true' && steps.email.outputs.status_code == '0'
        uses: actions/cache/save@v4
        with:
          path: .github/.tmp/fixture-audit-marker
          key: fixture-audit-${{ steps.localtime.outputs.local_date }}

      - name: Write fixture audit summary
        if: always() && steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true') && steps.audit.outputs.had_due == 'true'
        env:
          AUDIT_STATUS: ${{ steps.audit.outputs.status_code }}
          PUSH_STATUS: ${{ steps.autocommit.outputs.push_status }}
          EMAIL_STATUS: ${{ steps.email.outputs.status_code }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("data/fixture-audits/reports/latest.json")
          updates_path = Path("data/fixture-audits/reports/latest-updates.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          report = json.loads(report_path.read_text(encoding="utf-8")) if report_path.exists() else {}
          updates = json.loads(updates_path.read_text(encoding="utf-8")) if updates_path.exists() else {}

          failing = [result for result in report.get("results", []) if result.get("status") != "passed"]
          lines = [
              "# Fixture Audit",
              "",
              f"- Checked competitions: `{report.get('checkedCompetitions', len(report.get('results', [])))}`",
              f"- Failing competitions: `{report.get('failingCompetitions', len(failing))}`",
              f"- Automatic updates: `{updates.get('totalUpdated', 0)}`",
              f"- Audit exit code: `{os.environ.get('AUDIT_STATUS', '?')}`",
              f"- Push status: `{os.environ.get('PUSH_STATUS', 'unknown')}`",
              f"- Email exit code: `{os.environ.get('EMAIL_STATUS', '?')}`",
              "",
          ]

          if failing:
              lines.append("## Failing competitions")
              lines.append("")
              for result in failing[:20]:
                  lines.append(f"- **{result['label']}** — `{result['status']}`")
              lines.append("")
          else:
              lines.append("## Result")
              lines.append("")
              lines.append("- All due competitions passed.")
              lines.append("")

          summary_path.write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Fail workflow when email could not be sent
        if: always() && steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true') && steps.audit.outputs.had_due == 'true' && steps.email.outputs.status_code != '0'
        run: |
          echo "Fixture audit mail failed to send."
          exit 1

      - name: Log fixture audit issues
        if: always() && steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true') && steps.audit.outputs.had_due == 'true' && steps.audit.outputs.status_code != '0'
        run: |
          echo "Fixture audit found issues. See report artifact and email summary."

      - name: Log fixture audit push issues
        if: always() && steps.localtime.outputs.run_now == 'true' && (github.event_name != 'schedule' || steps.marker.outputs.cache-hit != 'true') && steps.audit.outputs.had_due == 'true' && steps.autocommit.outputs.push_status != '' && steps.autocommit.outputs.push_status != 'no_changes' && steps.autocommit.outputs.push_status != 'success'
        run: |
          echo "Fixture audit sync could not persist changes automatically. Push status: ${{ steps.autocommit.outputs.push_status }}"
